name: Publish Packages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Publish @vox/client if needed
        working-directory: packages/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@vox/client@$VERSION" version >/dev/null 2>&1; then
            echo "@vox/client@$VERSION already exists on npm"
            exit 0
          fi
          npm publish --access public --provenance

      - name: Publish @vox/cli if needed
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@vox/cli@$VERSION" version >/dev/null 2>&1; then
            echo "@vox/cli@$VERSION already exists on npm"
            exit 0
          fi
          npm publish --access public --provenance
