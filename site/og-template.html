<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #09090b;
        --panel: rgba(20, 20, 22, 0.94);
        --ink: #fafafa;
        --muted: #a1a1aa;
        --soft: #71717a;
        --accent: #34d399;
        --accent-strong: #10b981;
        --line: rgba(255, 255, 255, 0.1);
        --grid: rgba(255, 255, 255, 0.045);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at 8% 14%, rgba(52, 211, 153, 0.14), transparent 24rem),
          radial-gradient(circle at 92% 86%, rgba(52, 211, 153, 0.08), transparent 20rem),
          var(--bg);
        color: var(--ink);
        font-family: "Inter", sans-serif;
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, var(--grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.18;
      }

      .grid::before,
      .grid::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, var(--grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .grid::before {
        opacity: 0.5;
        mask-image: radial-gradient(circle at 48px 48px, black 0, black 19rem, transparent 34rem);
      }

      .grid::after {
        opacity: 0.36;
        mask-image: radial-gradient(circle at calc(100% - 48px) calc(100% - 48px), black 0, black 18rem, transparent 34rem);
      }

      .corner {
        position: absolute;
        width: 96px;
        height: 96px;
        opacity: 0.72;
      }

      .corner::before,
      .corner::after {
        content: "";
        position: absolute;
      }

      .corner::before {
        width: 96px;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), transparent);
      }

      .corner::after {
        width: 2px;
        height: 96px;
        background: linear-gradient(180deg, var(--accent), transparent);
      }

      .corner.tl {
        top: 48px;
        left: 48px;
      }

      .corner.br {
        right: 48px;
        bottom: 48px;
        transform: rotate(180deg);
      }

      .wrap {
        position: relative;
        height: 100%;
        padding: 48px 72px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        column-gap: 48px;
      }

      .left {
        display: flex;
        align-items: center;
        padding-top: 28px;
      }

      .right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: space-between;
        padding-top: 4px;
        text-align: right;
      }

      .tag {
        padding: 10px 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 700px;
      }

      h1 {
        margin: 0;
        font-family: "Instrument Serif", serif;
        font-size: 98px;
        line-height: 0.9;
        letter-spacing: -0.05em;
        font-weight: 400;
      }

      .accent {
        color: var(--accent);
        font-style: italic;
      }

      .sub {
        margin-top: 22px;
        color: var(--muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        line-height: 1.7;
        letter-spacing: 0.02em;
      }

      .right-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 22px;
        width: 100%;
        margin-top: 64px;
      }

      .panel {
        width: 100%;
        padding: 22px 24px 20px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      .panel-label {
        color: var(--soft);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-align: left;
      }

      .panel-stat {
        margin-top: 14px;
        color: var(--ink);
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        line-height: 1.85;
        text-align: left;
      }

      .panel-accent {
        height: 4px;
        margin-top: 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--accent) 28%, var(--accent-strong) 72%, transparent);
      }

      .site {
        color: var(--muted);
        font-family: "JetBrains Mono", monospace;
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="corner tl"></div>
    <div class="corner br"></div>

    <div class="wrap">
      <div class="left">
        <div class="hero">
          <h1>
            The fastest transcription
            <br />
            <span class="accent">framework for builders.</span>
          </h1>
        </div>
      </div>

      <div class="right">
        <div class="tag">macOS local runtime</div>

        <div class="right-stack">
          <div class="sub">Native macOS. Fast. Observable.</div>

          <div class="panel">
            <div class="panel-label">Operator view</div>
            <div class="panel-stat">
              inference: ~151ms
              <br />
              tags: clientId / route / modelId
              <br />
              speed: 35.25x realtime
            </div>
            <div class="panel-accent"></div>
          </div>

          <div class="site">vox.arach.dev/gh</div>
        </div>
      </div>
    </div>
  </body>
  </html>
